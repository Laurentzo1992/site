{% extends "base.html" %}



{% block main %}
 <!-- Featured Projects-->
 <section class="section section-lg bg-default text-center">
    <div class="container">
      <div class="row row-30 row-md-50 row-xl-70">
        <div class="col-sm-6 col-lg-4 wow fadeIn">
          <!-- Post Minimal-->
          {% for data in evenements %}
          <div class="post-minimal">
            <figure class="post-minimal-media"><a href="#"><img class="post-minimal-image" src="{{data.image.url}}" alt="" width="370" height="260"/></a></figure>
            <div class="post-minimal-meta">
              <ul class="list-inline">
                <li class="list-inline-item">Mentor:</li>
                <li class="list-inline-itema">{{data.initiateur.username}}</li>
              </ul>
              <ul class="list-inline">
                <li class="list-inline-itema"><a href="{{data.lien}}" >{{data.lien}}</a></li>
              </ul>
            </div>
            <h4 class="post-minimal-title">{{data.libelle}}</h4>
          </div>
        </div>
        {% endfor %}
    </div>
  </section>
{% endblock main %}
