{% extends "base.html" %}
{% load static %}
{% block main %}

<div class="auth-wrapper d-flex no-block justify-content-center align-items-center bg-dark">
    <div class="auth-box bg-dark border-top border-secondary">
        <div>
            <div class="text-center p-t-20 p-b-20">
                <span class="db"><img src="media/images/logo-inverse-245x50.png" alt="logo" /></span>
            </div>
            <!-- Form -->
            <form class="form-horizontal m-t-20" action="{% url 'createuser' %}" method="post">
                {% csrf_token %}
                <div class="row p-b-30">
                    <div class="col-12">
                        <div class="input-group mb-3">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-success text-white" id="basic-addon1"><i class="fa fa-user text-primary"></i></span>
                            </div>
                            <input type="text" class="form-control form-control-lg" name="username" placeholder="Nom d'Utilisateur" aria-label="Username" aria-describedby="basic-addon1" required>
                        </div>
                        <!-- email -->
                        <div class="input-group mb-3">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-danger text-white" id="basic-addon1"><i class="fa fa-envelope text-primary"></i></span>
                            </div>
                            <input type="email" class="form-control form-control-lg" name="email" placeholder="Email Addresse" aria-label="Username" aria-describedby="basic-addon1" required>
                        </div>
                        <div class="input-group mb-3">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-warning text-white" id="basic-addon2"><i class="fa fa-key text-primary"></i></span>
                            </div>
                            <input type="password" class="form-control form-control-lg" name="password" placeholder="Mot de Passe" aria-label="Password" aria-describedby="basic-addon1" required>
                        </div>
                        <div class="input-group mb-3">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-info text-white" id="basic-addon2"><i class="fa fa-key text-primary"></i></span>
                            </div>
                            <input type="password" class="form-control form-control-lg" name="password2" placeholder="Confirmer Mot de Passe" aria-label="Password" aria-describedby="basic-addon1" required>
                        </div>
                    </div>
                </div>
                <div class="row border-top border-secondary">
                    <div class="col-12">
                        <div class="form-group">
                            <div class="p-t-20">
                                <button class="btn btn-block btn-primary" type="submit">S'Inscrire</button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>



{% for message in messages %}
        {% comment %} <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script> {% endcomment %}
        <script src="{% static 'js/sweetalert.min.js' %}"></script>
        {% if message.tags == 'error' %}
        <script>
            var m = "{{ message }}";
            swal("Réfusé!", m, "error");
        </script>
        {% elif message.tags == 'success' %}
        <script>
            var m = "{{ message }}";
            swal("Bienvenue!", m, "success");
        </script>
        {% elif message.tags == 'warning' %}
        <script>
            var m = "{{ message }}";
            swal("A bientôt!", m, "warning");
        </script>
        {% endif %}

{% endfor%}

{% endblock main %}
